<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 RyotaXD Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #0f0f0f; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #181818; padding: 15px 25px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 20px; }
        .logo { font-weight: 900; font-size: 24px; color: #ff6b6b; flex: 1; }
        .search-container { flex: 2; position: relative; max-width: 500px; }
        .search-input { width: 100%; padding: 12px 20px 12px 45px; background: #222; border: 1px solid #444; border-radius: 25px; color: #fff; outline: none; }
        .search-input:focus { border-color: #ff6b6b; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .song-card { background: #181818; padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; border: 1px solid transparent; }
        .song-card:hover { background: #282828; border-color: #ff6b6b; }
        .song-card.selected { background: rgba(255, 107, 107, 0.1); border-color: #ff6b6b; }
        .thumbnail { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .player-bar { background: #181818; border-top: 1px solid #333; padding: 15px 25px; display: flex; align-items: center; gap: 20px; }
        .play-btn { width: 55px; height: 55px; border-radius: 50%; background: #ff6b6b; border: none; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .status { position: fixed; top: 20px; right: 20px; background: #ff6b6b; color: #fff; padding: 10px 20px; border-radius: 20px; transform: translateX(250%); transition: 0.4s; z-index: 1000; font-size: 14px; }
        .status.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">RyotaXD</div>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Cari lagu...">
        </div>
    </div>

    <div class="main-content">
        <div id="searchResults" class="song-grid"></div>
    </div>

    <div class="player-bar">
        <button id="playBtn" class="play-btn" onclick="playSelected()" disabled><i class="fas fa-play"></i></button>
        <div class="info">
            <div id="nowPlayingTitle" style="font-weight: 500;">Pilih lagu...</div>
            <div id="nowPlayingArtist" style="color: #aaa; font-size: 12px;">-</div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>
    <div id="status" class="status"></div>

    <script>
        let selectedSong = null;
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');

        function showStatus(msg) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.classList.add('show');
            setTimeout(() => s.classList.remove('show'), 3000);
        }

        async function searchSongs() {
            const query = document.getElementById('searchInput').value.trim();
            if(!query) return;
            showStatus("🔍 Mencari...");
            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query})
                });
                const data = await res.json();
                const container = document.getElementById('searchResults');
                container.innerHTML = '';
                data.results.forEach(song => {
                    const div = document.createElement('div');
                    div.className = 'song-card';
                    div.onclick = () => {
                        selectedSong = song;
                        document.querySelectorAll('.song-card').forEach(c => c.classList.remove('selected'));
                        div.classList.add('selected');
                        playBtn.disabled = false;
                        document.getElementById('nowPlayingTitle').innerText = song.title;
                        document.getElementById('nowPlayingArtist').innerText = song.uploader;
                    };
                    div.innerHTML = `<img src="${song.thumbnail}" class="thumbnail"><div><div style="font-size:14px">${song.title.substring(0,40)}</div><div style="font-size:11px;color:#aaa">${song.uploader}</div></div>`;
                    container.appendChild(div);
                });
            } catch (e) { showStatus("❌ Error koneksi"); }
        }

        async function playSelected() {
            if(!selectedSong) return;
            showStatus("⏳ Mendapatkan stream...");
            playBtn.disabled = true;
            try {
                const res = await fetch('/get_stream_url', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: selectedSong.url})
                });
                const data = await res.json();
                if(data.success) {
                    audio.src = data.stream_url;
                    audio.load();
                    audio.play().then(() => {
                        showStatus("▶️ Memutar...");
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    });
                }
            } catch (e) { showStatus("❌ Gagal memutar"); }
            finally { playBtn.disabled = false; }
        }

        document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') searchSongs(); });
        audio.onpause = () => playBtn.innerHTML = '<i class="fas fa-play"></i>';
        audio.onplay = () => playBtn.innerHTML = '<i class="fas fa-pause"></i>';
    </script>
</body>
</html>
